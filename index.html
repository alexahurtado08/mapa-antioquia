<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuestros Viajes por Antioquia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      background-image:
        radial-gradient(ellipse at 20% 20%, #1a1a2e 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, #1a0a1e 0%, transparent 60%);
      font-family: 'Cormorant Garamond', serif;
      color: #f0ece4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    .encabezado {
      text-align: center;
      margin-bottom: 48px;
    }

    .corazon {
      font-size: 1.4rem;
      display: block;
      margin-bottom: 8px;
      animation: latido 1.8s ease-in-out infinite;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem;
      color: #a8d8d8;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    p.subtitulo {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: #8a9bb0;
      letter-spacing: 0.08em;
    }

    .contenido {
      display: flex;
      gap: 48px;
      align-items: flex-start;
      width: 100%;
      max-width: 1150px;
    }

    #mapa-contenedor {
      flex: 1;
      min-width: 320px;
    }

    svg { width: 100%; height: auto; }

    .municipio {
      fill: #1e2a3a;
      stroke: #2e4a5a;
      stroke-width: 0.6;
      cursor: pointer;
      transition: fill 0.25s ease, stroke 0.25s ease;
    }

    .municipio:hover {
      stroke: #a8d8d8;
      stroke-width: 1.2;
      filter: brightness(1.3);
    }

    .municipio.seleccionado {
      stroke: #ffffff;
      stroke-width: 1.8;
      filter: brightness(1.4);
    }

    /* Panel lateral */
    #panel {
      width: 320px;
      min-height: 420px;
      background: linear-gradient(145deg, #111827, #1a1f2e);
      border: 1px solid #2a3a4a;
      border-radius: 20px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      position: sticky;
      top: 40px;
    }

    #panel.vacio {
      color: #4a5568;
      font-style: italic;
      text-align: center;
      gap: 16px;
    }

    .icono-vacio {
      font-size: 2.8rem;
      opacity: 0.25;
    }

    #panel-nombre {
      font-family: 'Dancing Script', cursive;
      font-size: 1.8rem;
      color: #a8d8d8;
      margin-bottom: 16px;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .foto-wrapper {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .foto-wrapper img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 260px;
      transition: transform 0.4s ease;
    }

    .foto-wrapper img:hover { transform: scale(1.03); }

    .badge {
      margin-top: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      padding: 5px 16px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .badge.visitado {
      background: #a8d8d822;
      color: #a8d8d8;
      border: 1px solid #a8d8d855;
    }

    .badge.pendiente {
      background: #4a556822;
      color: #4a5568;
      border: 1px solid #4a556855;
    }

    .sin-foto {
      color: #4a5568;
      font-style: italic;
      font-size: 0.95rem;
      text-align: center;
      margin-top: 8px;
    }

    /* Contador */
    .contador {
      margin-top: 32px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: #4a5568;
      letter-spacing: 0.05em;
    }

    .contador span {
      color: #a8d8d8;
      font-size: 1.25rem;
      font-style: normal;
      font-weight: 600;
    }

    #tooltip {
      position: fixed;
      background: #111827ee;
      border: 1px solid #a8d8d844;
      color: #f0ece4;
      padding: 6px 14px;
      border-radius: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <div class="encabezado">
    <span class="corazon">🤍</span>
    <h1>Nuestros Viajes por Antioquia</h1>
    <p class="subtitulo">cada lugar visitado, un recuerdo compartido</p>
  </div>

  <div class="contenido">
    <div id="mapa-contenedor">
      <svg id="mapa"></svg>
    </div>

    <div id="panel" class="vacio">
      <div class="icono-vacio">🗺️</div>
      <p>Toca un municipio para revivir el recuerdo</p>
    </div>
  </div>

  <p class="contador">
    Municipios visitados juntos: <span id="count">0</span> de 125
  </p>

  <div id="tooltip"></div>

  <script>
    // Paleta pastel romántica — se asigna aleatoriamente pero fija por municipio
    const paletaPastel = [
      "#f4a7b9", // rosado suave
      "#b5d5c5", // verde menta
      "#c9b8e8", // lavanda
      "#f9c784", // durazno
      "#a8d8d8", // aqua
      "#f7c5a0", // melocotón
      "#b8d4f0", // azul cielo
      "#e8c4d4", // rosa empolvado
      "#c5e0b4", // verde salvia
      "#d4b8e0", // orquídea
    ];

    // Asigna un color pastel fijo por nombre (siempre el mismo para el mismo municipio)
    function colorParaMunicipio(nombre) {
      let hash = 0;
      for (let i = 0; i < nombre.length; i++) {
        hash = nombre.charCodeAt(i) + ((hash << 5) - hash);
      }
      return paletaPastel[Math.abs(hash) % paletaPastel.length];
    }

    const tooltip = document.getElementById("tooltip");
    let seleccionado = null;

    Promise.all([
      d3.json("assets/viajes.json"),
      d3.json("assets/antioquia.geojson")
    ]).then(([viajes, geoData]) => {

      const svg = d3.select("#mapa");
      const width = 700, height = 730;
      svg.attr("viewBox", `0 0 ${width} ${height}`);

      const proyeccion = d3.geoMercator().fitSize([width, height], geoData);
      const path = d3.geoPath().projection(proyeccion);

      svg.selectAll("path")
        .data(geoData.features)
        .enter()
        .append("path")
        .attr("class", "municipio")
        .attr("d", path)
        .style("fill", d => {
          const nombre = d.properties.MPIO_CNMBR;
          return viajes[nombre] ? colorParaMunicipio(nombre) : "#1e2a3a";
        })
        .on("mousemove", (event, d) => {
          const nombre = d.properties.MPIO_CNMBR;
          tooltip.style.opacity = "1";
          tooltip.style.left = (event.clientX + 16) + "px";
          tooltip.style.top  = (event.clientY - 34) + "px";
          tooltip.textContent = nombre + (viajes[nombre] ? " 💕" : "");
        })
        .on("mouseleave", () => tooltip.style.opacity = "0")
        .on("click", (event, d) => {
          const nombre = d.properties.MPIO_CNMBR;
          const fotoPath = viajes[nombre];
          const color = colorParaMunicipio(nombre);

          if (seleccionado) seleccionado.classed("seleccionado", false);
          seleccionado = d3.select(event.currentTarget);
          seleccionado.classed("seleccionado", true);

          const panel = document.getElementById("panel");
          panel.classList.remove("vacio");
          panel.innerHTML = `
            <div id="panel-nombre">${nombre}</div>
            ${fotoPath ? `
              <div class="foto-wrapper">
                <img src="${fotoPath}" alt="${nombre}" style="display:block;" />
              </div>
            ` : `
              <p class="sin-foto">📷 Aún no hemos visitado este municipio juntos</p>
            `}
            <div class="badge ${fotoPath ? 'visitado' : 'pendiente'}"
                 style="${fotoPath ? `color:${color};border-color:${color}44;background:${color}18;` : ''}">
              ${fotoPath ? '💕 visitado' : '⏳ pendiente'}
            </div>
          `;
        });

      document.getElementById("count").textContent = Object.keys(viajes).length;
    });
  </script>

</body>
</html>
